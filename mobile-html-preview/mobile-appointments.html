<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hunter — Мои записи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 38px 38px;
      background-attachment: fixed;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: 108px;
    }
    .font-cormorant { font-family: 'Cormorant Garamond', Georgia, serif; }    .z { position: relative; z-index: 10; }
  </style>
</head>
<body data-page="appointments">

  <!-- Top bar -->
  <div class="z" style="display:flex;align-items:center;justify-content:space-between;padding:48px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);">
    <span class="font-cormorant" style="font-size:22px;letter-spacing:0.22em;font-weight:300;color:#fff;">HUNTER</span>
    <button data-open-settings="true" style="background:none;border:none;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Profile -->
  <div class="z" style="padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.08);">
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="width:48px;height:48px;border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span class="font-cormorant" style="font-size:15px;font-weight:300;color:rgba(255,255,255,0.7);">АБ</span>
      </div>
      <div style="flex:1;">
        <p data-profile-name class="font-cormorant" style="font-size:15px;font-weight:300;color:#fff;margin-bottom:2px;">Алексей Борисов</p>
        <p data-profile-phone style="font-size:11px;color:rgba(255,255,255,0.35);">+7 (999) 123-45-67</p>
      </div>
      <span data-profile-visits style="font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);padding:4px 8px;white-space:nowrap;">3 визита</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="z" style="display:flex;border-bottom:1px solid rgba(255,255,255,0.08);">
    <button data-appointments-tab="upcoming" style="flex:1;padding:12px;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#fff;background:none;border:none;border-bottom:1px solid #fff;cursor:pointer;">Предстоящие</button>
    <button data-appointments-tab="completed" style="flex:1;padding:12px;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;">Завершённые</button>
  </div>

  <!-- Appointments -->
  <div class="z" style="flex:1;padding:0 20px;">

    <div data-appointments-list></div>

    <!-- Loyalty -->
    <div style="margin:24px 0;border:1px solid rgba(255,255,255,0.15);padding:16px;background:#111;">
      <p style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;">Программа лояльности</p>
      <p class="font-cormorant" style="font-size:17px;font-weight:300;color:#fff;margin-bottom:8px;">Ещё 2 визита</p>
      <p style="font-size:11px;color:rgba(255,255,255,0.4);line-height:1.5;margin-bottom:16px;">Посетите барбершоп ещё дважды и получите скидку на следующую стрижку.</p>
      <div style="height:1px;background:rgba(255,255,255,0.1);">
        <div style="height:100%;background:rgba(255,255,255,0.7);width:60%;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.25);">3 / 5 визитов</span>
        <span style="font-size:9px;color:rgba(255,255,255,0.25);">Скидка 15%</span>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="z" style="position:fixed;left:0;right:0;bottom:0;z-index:40;border-top:1px solid rgba(255,255,255,0.08);background:rgba(11,11,11,0.98);backdrop-filter:blur(14px);box-shadow:0 -16px 40px rgba(0,0,0,0.32);">
    <div style="display:flex;justify-content:space-around;align-items:center;min-height:88px;padding:14px 8px calc(12px + env(safe-area-inset-bottom));">
      <button data-nav-target="mobile-home.html" style="display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);">Главная</span>
      </button>
      <button data-nav-target="mobile-services.html" style="display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
        <span style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);">Услуги</span>
      </button>
      <button data-nav-target="mobile-appointments.html" style="display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:#fff;">Записи</span>
      </button>
      <button data-open-auth="true" style="display:flex;flex-direction:column;align-items:center;gap:5px;background:none;border:none;cursor:pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span style="font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.25);">Профиль</span>
      </button>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
