<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hunter — Запись</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 38px 38px;
      background-attachment: fixed;
      color: #fff;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-y: auto;
    }
    .font-cormorant { font-family: 'Cormorant Garamond', Georgia, serif; }    .z { position: relative; z-index: 10; }
    .slot { border: 1px solid rgba(255,255,255,0.2); padding: 12px; text-align: center; background: #111; cursor: pointer; }
    .slot.unavail { border-color: rgba(255,255,255,0.06); }
    .slot.selected { background: #fff; border-color: #fff; }
    .slot span { font-size: 11px; letter-spacing: 0.05em; color: rgba(255,255,255,0.6); }
    .slot.unavail span { color: rgba(255,255,255,0.15); }
    .slot.selected span { color: #000; }
    input-row { display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.15); padding: 12px 16px; }
  </style>
</head>
<body data-page="booking">

  <!-- Top bar -->
  <div class="z" style="display:flex;align-items:center;justify-content:space-between;padding:48px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08);">
    <button data-back-target="mobile-services.html" style="background:none;border:none;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div style="text-align:center;">
      <span class="font-cormorant" style="display:block;font-size:22px;letter-spacing:0.22em;font-weight:300;color:#fff;">HUNTER</span>
      <span style="font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);">Запись · шаг 2 из 4</span>
    </div>
    <div style="width:18px;"></div>
  </div>

  <!-- Selected service -->
  <div class="z" style="margin:24px 20px;border:1px solid rgba(255,255,255,0.15);padding:16px;background:#111;">
    <p style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;">Выбранная услуга</p>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <p data-selected-service-name class="font-cormorant" style="font-size:20px;font-weight:300;color:#fff;">Стрижка</p>
      <div style="text-align:right;">
        <p data-selected-service-duration style="font-size:11px;color:rgba(255,255,255,0.4);">60 мин</p>
        <p data-selected-service-meta style="font-size:11px;color:rgba(255,255,255,0.4);">По запросу</p>
      </div>
    </div>
  </div>

  <!-- Date picker -->
  <div class="z" style="padding:0 20px 24px;">
    <p style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px;">Выберите дату</p>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Пн</span>
        <button data-date-button="true" data-date-label="19 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;">19</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Вт</span>
        <button data-date-button="true" data-date-label="20 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);background:none;cursor:pointer;">20</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Ср</span>
        <button data-date-button="true" data-date-label="21 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;">21</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Чт</span>
        <button data-date-button="true" data-date-label="22 мая 2025" data-default="true" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;background:#fff;border:none;cursor:pointer;">22</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Пт</span>
        <button data-date-button="true" data-date-label="23 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;">23</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Сб</span>
        <button data-date-button="true" data-date-label="24 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;">24</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <span style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.05em;">Вс</span>
        <button data-date-button="true" data-date-label="25 мая 2025" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;">25</button>
      </div>
    </div>
  </div>

  <!-- Time slots -->
  <div class="z" style="padding:0 20px 24px;">
    <p style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px;">Выберите время</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
      <button data-time-slot="09:00" data-unavailable="true" class="slot unavail"><span>09:00</span></button>
      <button data-time-slot="10:00" class="slot"><span>10:00</span></button>
      <button data-time-slot="11:00" data-unavailable="true" class="slot unavail"><span>11:00</span></button>
      <button data-time-slot="12:00" class="slot"><span>12:00</span></button>
      <button data-time-slot="14:00" data-default="true" class="slot selected"><span>14:00</span></button>
      <button data-time-slot="15:00" class="slot"><span>15:00</span></button>
      <button data-time-slot="16:00" data-unavailable="true" class="slot unavail"><span>16:00</span></button>
      <button data-time-slot="17:00" class="slot"><span>17:00</span></button>
      <button data-time-slot="18:00" class="slot"><span>18:00</span></button>
    </div>
  </div>

  <!-- Contact fields -->
  <div class="z" style="padding:0 20px 24px;">
    <p style="font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px;">Ваши данные</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,0.15);padding:12px 16px;background:#111;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.92 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input data-booking-phone type="tel" placeholder="+7 (___) ___-__-__" style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:#fff;" />
      </div>
      <div style="display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,0.15);padding:12px 16px;background:#111;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input data-booking-name type="text" placeholder="Ваше имя" style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:#fff;" />
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="z" style="padding:0 20px 32px;margin-top:auto;">
    <button data-confirm-booking="true" style="width:100%;border:1px solid #fff;background:#fff;padding:16px;text-align:center;cursor:pointer;">
      <span style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#000;">Подтвердить запись</span>
    </button>
  </div>
  <script src="./app.js"></script>
</body>
</html>
