worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml;

    # ---------- Rate limiting ----------
    limit_req_zone $binary_remote_addr zone=public_api:10m rate=30r/m;

    # ==========================================================
    # DEFAULT SERVER — отклоняет все неизвестные домены
    # Защита от привязки чужих доменов к вашему IP
    # ==========================================================
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # ==========================================================
    # HTTP → HTTPS редирект (только ваш домен)
    # ЗАМЕНИТЕ slava-hunter.ru на ваш домен
    # ==========================================================
    server {
        listen 80;
        server_name slava-hunter.ru www.slava-hunter.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://slava-hunter.ru$request_uri;
        }
    }

    # ==========================================================
    # HTTPS — основной сервер
    # ЗАМЕНИТЕ slava-hunter.ru на ваш домен
    # ==========================================================
    server {
        listen 443 ssl http2;
        server_name slava-hunter.ru www.slava-hunter.ru;

        # SSL (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/slava-hunter.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/slava-hunter.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---------- API (rate limited) ----------
        location /api/public/ {
            limit_req zone=public_api burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- API (admin) ----------
        location /api/ {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- Next.js assets (для CRM) ----------
        location /_next/ {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------- Admin CRM ----------
        location /admin {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---------- Frontend (SPA) ----------
        location / {
            root /var/www/frontend;
            try_files $uri $uri/ /index.html;
        }

        location /assets/ {
            root /var/www/frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
